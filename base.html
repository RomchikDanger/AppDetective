<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Photo Detective</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
	<nav class="navbar navbar-expand-lg navbar-dark bg-black mb-4">
		<div class="container">
			<a class="navbar-brand fw-bold text-warning" href="/">Photo Detective</a>
			<div class="d-flex align-items-center gap-3">
				<a href="/leaderboard" class="btn btn-outline-warning btn-sm">Лидерборд</a>
				{% if current_user.is_authenticated %}
					<span class="text-light">{{ current_user.username }}</span>
					<a href="/dashboard" class="btn btn-outline-light btn-sm">Мои дела</a>
					<a href="/logout" class="btn btn-danger btn-sm">Выйти</a>
				{% else %}
					<a href="/login" class="btn btn-warning btn-sm">Войти</a>
					<a href="/register" class="btn btn-outline-light btn-sm">Регистрация</a>
				{% endif %}
			</div>
		</div>
	</nav>
	<div class="container">
		{% with messages = get_flashed_messages() %}
			{% for msg in messages %}
				<div class="alert alert-info">{{ msg }}</div>
			{% endfor %}
		{% endwith %}
		{% block content %}{% endblock %}
	</div>
</body>
</html>
