<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Photo Detective</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		.btn-sm-custom {
			padding: 0.25rem 0.5rem;
			font-size: 0.75rem;
		}
	</style>
</head>
<body class="bg-dark text-light">
	<nav class="navbar navbar-expand-lg navbar-dark bg-black mb-4">
		<div class="container">
			<a class="navbar-brand fw-bold text-warning" href="/">Photo Detective</a>
			<div class="d-flex align-items-center gap-2 flex-wrap">
				<a href="/leaderboard" class="btn btn-outline-warning btn-sm-custom">🏆</a>

				{% if current_user.is_authenticated %}
					<a href="{{ url_for('search') }}" class="btn btn-outline-info btn-sm-custom">🔍</a>
					<a href="{{ url_for('search_users') }}" class="btn btn-outline-info btn-sm-custom">🔍👤</a>
					<a href="{{ url_for('statistics') }}" class="btn btn-outline-success btn-sm-custom">📊</a>
					<a href="{{ url_for('inbox') }}" class="btn btn-outline-info btn-sm-custom">📧</a>
					<a href="{{ url_for('friends_list') }}" class="btn btn-outline-success btn-sm-custom">👥</a>
					<a href="{{ url_for('achievements') }}" class="btn btn-outline-warning btn-sm-custom">🏅</a>
					<a href="{{ url_for('user_profile', user_id=current_user.id) }}" class="btn btn-outline-primary btn-sm-custom">👤</a>
					<a href="{{ url_for('edit_profile') }}" class="btn btn-outline-secondary btn-sm-custom">✏️</a>

					<span class="text-light mx-1">{{ current_user.username }}</span>
					<a href="/dashboard" class="btn btn-outline-light btn-sm-custom">📁</a>
					<a href="/logout" class="btn btn-danger btn-sm-custom">🚪</a>
				{% else %}
					<a href="/login" class="btn btn-warning btn-sm-custom">Вход</a>
					<a href="/register" class="btn btn-outline-light btn-sm-custom">Рег</a>
				{% endif %}
			</div>
		</div>
	</nav>
	<div class="container">
		{% with messages = get_flashed_messages() %}
			{% for msg in messages %}
				<div class="alert alert-info alert-dismissible fade show small" role="alert">
					{{ msg }}
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
			{% endfor %}
		{% endwith %}
		{% block content %}{% endblock %}
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
