{% extends "base.html" %}
{% block content %}
<h2>Сообщение</h2>
<div class="card bg-secondary">
    <div class="card-body">
        <div class="d-flex justify-content-between">
            <strong>От: {{ message.sender.username }}</strong>
            <small>{{ message.created_at }}</small>
        </div>
        <hr>
        <p>{{ message.content }}</p>
    </div>
</div>
<div class="mt-3">
    <a href="{{ url_for('inbox') }}" class="btn btn-secondary">← Назад</a>
    <a href="{{ url_for('send_message', receiver_id=message.sender.id) }}" class="btn btn-primary">Ответить</a>
</div>
{% endblock %}
