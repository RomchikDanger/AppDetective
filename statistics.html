{% extends "base.html" %}
{% block content %}
<h2>Статистика</h2>
<div class="row">
    <div class="col-md-4 mb-3">
        <div class="card bg-secondary">
            <div class="card-body text-center">
                <h1 class="display-4">{{ total_users }}</h1>
                <p class="mb-0">ПОЛЬЗОВАТЕЛЕЙ</p>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card bg-secondary">
            <div class="card-body text-center">
                <h1 class="display-4">{{ total_investigations }}</h1>
                <p class="mb-0">РАССЛЕДОВАНИЙ</p>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card bg-secondary">
            <div class="card-body text-center">
                <h1 class="display-4">{{ total_evidences }}</h1>
                <p class="mb-0">УЛИК</p>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card bg-secondary">
            <div class="card-body text-center">
                <h1 class="display-4">{{ total_likes }}</h1>
                <p class="mb-0">ЛАЙКОВ</p>
            </div>
        </div>
    </div>
    <div class="col-md-4 mb-3">
        <div class="card bg-secondary">
            <div class="card-body text-center">
                <h1 class="display-4">{{ total_comments }}</h1>
                <p class="mb-0">КОММЕНТАРИЕВ</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
